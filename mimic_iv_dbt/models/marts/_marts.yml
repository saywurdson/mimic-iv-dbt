version: 2

models:
  - name: kpi_admission_base
    description: >
      One row per hospital admission with derived critical-care attributes
      (age, hospital/ICU length of stay, in-hospital and 30-day mortality,
      30-day readmission). Foundation for the KPI summary marts.
    columns:
      - name: visit_occurrence_id
        description: OMOP hospital admission id.
        data_tests: [unique, not_null]
      - name: person_id
        data_tests: [not_null]

  - name: kpi_patient_base
    description: >
      One row per patient, rolled up from kpi_admission_base and joined to
      gender/race vocabulary names. First-admission age and age band included.
    columns:
      - name: person_id
        data_tests: [unique, not_null]

  - name: kpi_cohort_summary
    description: Single-row headline counts (patients, admissions, ICU stays, deaths).

  - name: kpi_demographics
    description: Tidy (dimension, category) patient counts and percentages for gender, race, age band.
    columns:
      - name: dimension
        data_tests:
          - accepted_values:
              arguments:
                values: ['gender', 'race', 'age_band']

  - name: kpi_outcomes
    description: >
      Tidy (metric, value, unit) table of mortality, readmission, and
      length-of-stay KPIs computed per admission.
    columns:
      - name: metric
        data_tests: [unique, not_null]

  - name: kpi_top_conditions
    description: Top 25 condition concepts by distinct patient count.
    columns:
      - name: rank
        data_tests: [unique, not_null]
  - name: kpi_top_drugs
    description: Top 25 drug concepts by distinct patient count.
    columns:
      - name: rank
        data_tests: [unique, not_null]
  - name: kpi_top_procedures
    description: Top 25 procedure concepts by distinct patient count.
    columns:
      - name: rank
        data_tests: [unique, not_null]
  - name: kpi_top_measurements
    description: Top 25 measurement (lab/vital) concepts by distinct patient count.
    columns:
      - name: rank
        data_tests: [unique, not_null]

  # --- Emergency Department (MIMIC-IV-ED module) ---------------------------
  - name: kpi_ed_summary
    description: >
      Single-row ED headline counts: ED visits, ED patients, ED -> inpatient
      admissions and rate, and median ED length of stay (hours).

  - name: kpi_ed_breakdowns
    description: >
      Tidy (dimension, category) counts of ED stays for disposition,
      arrival_transport, and triage acuity, with percent of all ED stays.
    columns:
      - name: dimension
        data_tests:
          - accepted_values:
              arguments:
                values: ['disposition', 'arrival_transport', 'acuity']

  - name: kpi_ed_chief_complaints
    description: Top 20 ED chief complaints (free-text, as entered at triage) by ED-stay count.
    columns:
      - name: rank
        data_tests: [unique, not_null]

  # --- Payer mix and DRG (payer_plan_period + cost tables) -----------------
  - name: kpi_payer_mix
    description: >
      Payer (insurance) mix across hospital admissions from payer_plan_period:
      admission and distinct-patient counts and percent of admissions per payer.

  - name: kpi_top_drg
    description: Top 25 DRG concepts (from the cost table) by distinct patient count.
    columns:
      - name: rank
        data_tests: [unique, not_null]
